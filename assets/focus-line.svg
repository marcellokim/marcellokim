<svg width="900" height="46" viewBox="0 0 900 46" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated profile focus line</title>
  <desc id="desc">A rotating focus line for local-first automation, native macOS apps, and verifiable agent workflows.</desc>
  <style>
    text {
      font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      fill: #38BDF8;
    }
    .muted {
      fill: #64748B;
      font-weight: 600;
    }
  </style>
  <text x="450" y="29" text-anchor="middle" opacity="1">
    Local-first automation and study tools
    <animate attributeName="opacity" values="1;1;0;0;0;0;0;1" keyTimes="0;0.26;0.32;0.33;0.66;0.67;0.93;1" dur="9s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="29" text-anchor="middle" opacity="0">
    Native macOS apps with SwiftUI
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;0" keyTimes="0;0.26;0.32;0.59;0.65;0.66;0.93;1" dur="9s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="29" text-anchor="middle" opacity="0">
    Agent workflow infrastructure that stays verifiable
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.59;0.65;0.66;0.72;0.93;0.99;1" dur="9s" repeatCount="indefinite"/>
  </text>
  <text class="muted" x="884" y="29" text-anchor="middle" opacity="1">_</text>
</svg>
